version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: edgelink-proxy-redis-1
    ports:
      - "6379:6379"
    restart: always

  db:
    image: postgres:alpine
    container_name: edgelink-proxy-db-1
    environment:
      POSTGRES_DB: telemetry
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    restart: always